services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: talentdb
      POSTGRES_USER: talentdb
      POSTGRES_PASSWORD: talentdb
    ports:
      - "5432:5432"
    volumes:
      - talentdb_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # REST API (also has dashboard at /dashboard)
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

  python-parser:
    build:
      context: ../services/python-parser
    environment:
      PARSER_LOG_LEVEL: info
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
    ports:
      - "8000:8000"
    depends_on:
      - qdrant

  spring-api:
    build:
      context: ../services/spring-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: talentdb
      DB_USER: talentdb
      DB_PASS: talentdb
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: resumes
      PARSER_BASE_URL: http://python-parser:8000
      JWT_SECRET: o+Gq/yNwPX8MXObpulzqWfO/rLD0jAdIMdu3Ap+Feo/d9PIeBhBI42eaf4vqQMPa7qAlU0kiCs5uTnku+U0Wug==
    depends_on:
      - postgres
      - minio
      - python-parser
    ports:
      - "8080:8080"

  web:
    build:
      context: ../apps/web
    environment:
      NEXT_PUBLIC_API_BASE: http://localhost:8080
    depends_on:
      - spring-api
    ports:
      - "3000:3000"

volumes:
  talentdb_data:
  minio_data:
  qdrant_data:
