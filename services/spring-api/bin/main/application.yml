server:
  port: 8080

spring:
  application:
    name: niche-talentdb-api
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:dev_secret_change_me}
    issuer: niche-talentdb
    expiryMinutes: 720
  storage:
    bucket: ${MINIO_BUCKET:resumes}
  parser:
    baseUrl: ${PARSER_BASE_URL:http://localhost:8000}
