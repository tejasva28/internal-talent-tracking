spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:talentdb}}
    username: ${DB_USER:talentdb}
    password: ${DB_PASS:talentdb}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

app:
  storage:
    endpoint: ${S3_ENDPOINT:${MINIO_ENDPOINT:http://localhost:9000}}
    accessKey: ${S3_ACCESS_KEY:${MINIO_ACCESS_KEY:minioadmin}}
    secretKey: ${S3_SECRET_KEY:${MINIO_SECRET_KEY:minioadmin}}
